<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0F1B2D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TaskFlow">
<title>TaskFlow</title>
<!-- Favicon as inline SVG data URI -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230F1B2D'/><rect x='4' y='4' width='24' height='24' rx='6' fill='%231E2D42'/><circle cx='16' cy='16' r='9' fill='none' stroke='%2300C9A7' stroke-width='2'/><polyline points='11,16 14.5,19.5 21,13' fill='none' stroke='%2300C9A7' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0F1B2D; --surface:#1E2D42; --surface2:#263650; --border:#2E4060;
    --teal:#00C9A7; --teal-dim:#00977D; --amber:#F59E0B; --red:#EF4444;
    --text:#E8EDF2; --text-dim:#8899AA; --text-mute:#4A6080;
    --radius:10px; --radius-sm:6px; --shadow:0 4px 24px rgba(0,0,0,.4);
    --font:'Inter',sans-serif; --sidebar-w:280px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:var(--font);color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:14px;width:100%;outline:none;transition:border-color .2s}
  input:focus,textarea:focus,select:focus{border-color:var(--teal)}
  textarea{resize:vertical;min-height:80px}
  a{color:var(--teal);text-decoration:none}
  ul{list-style:none}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* ── BUTTONS ── */
  .btn-primary{background:var(--teal);color:#0F1B2D;font-weight:600;padding:12px 24px;border-radius:var(--radius);font-size:15px;transition:background .2s,transform .1s;border:none}
  .btn-primary:hover{background:var(--teal-dim)}
  .btn-primary:active{transform:scale(.97)}
  .btn-secondary{background:var(--surface);color:var(--text);font-weight:500;padding:10px 20px;border-radius:var(--radius);font-size:14px;border:1px solid var(--border);transition:background .2s}
  .btn-secondary:hover{background:var(--surface2)}
  .btn-danger{background:var(--red);color:#fff;font-weight:600;padding:10px 20px;border-radius:var(--radius);font-size:14px;border:none;transition:background .2s}
  .btn-danger:hover{background:#dc2626}
  .icon-btn{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:background .15s,color .15s;font-size:16px;border:none;background:none;cursor:pointer}
  .icon-btn:hover{background:var(--surface2);color:var(--text)}

  /* ── LOCK ── */
  #lockScreen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px}
  .lock-logo{font-size:48px}
  .lock-title{font-size:28px;font-weight:700;color:var(--teal);letter-spacing:-.5px}
  .lock-subtitle{color:var(--text-dim);font-size:14px}
  .lock-pw-form{display:flex;flex-direction:column;gap:12px;width:280px}
  .lock-error{color:var(--red);font-size:13px;min-height:18px;text-align:center}
  .pin-dots{display:flex;gap:12px;justify-content:center}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .2s}
  .pin-dot.filled{background:var(--teal);border-color:var(--teal)}
  .pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
  .pin-btn{width:72px;height:72px;border-radius:50%;background:var(--surface);font-size:22px;font-weight:500;transition:background .15s,transform .1s;border:1px solid var(--border)}
  .pin-btn:active{background:var(--surface2);transform:scale(.93)}
  .pin-btn.action{background:transparent;border-color:transparent;font-size:14px;color:var(--text-dim)}

  /* ── SETUP ── */
  #setupScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;overflow-y:auto}
  .setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:20px}
  .setup-card h2{font-size:22px;font-weight:700}
  .setup-card p{color:var(--text-dim);font-size:13px}
  .method-toggle{display:flex;gap:8px}
  .method-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface2);color:var(--text-dim);font-weight:500;transition:all .2s;cursor:pointer}
  .method-btn.active{border-color:var(--teal);color:var(--teal);background:rgba(0,201,167,.1)}
  .form-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

  /* ── APP SHELL ── */
  #app{display:none;height:100vh;flex-direction:column}
  .app-body{flex:1;display:flex;overflow:hidden}

  /* ── SIDEBAR ── */
  #sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s}
  .sidebar-header{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .app-logo{font-size:20px;font-weight:700;color:var(--teal);letter-spacing:-.5px}
  .sidebar-nav{padding:4px 8px;flex-shrink:0}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;color:var(--text-dim);font-size:14px}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:rgba(0,201,167,.12);color:var(--teal)}
  .nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
  .nav-item .nav-count{margin-left:auto;font-size:11px;background:var(--surface2);padding:1px 7px;border-radius:10px}
  .nav-item.active .nav-count{background:rgba(0,201,167,.2)}
  .sidebar-section{padding:16px 16px 4px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-mute);font-weight:600;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .lists-container{flex:1;overflow-y:auto;padding:0 8px 8px}
  .list-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s}
  .list-item:hover{background:var(--surface2)}
  .list-item.active{background:rgba(0,201,167,.08)}
  .list-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .list-name{flex:1;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-progress-text{font-size:11px;color:var(--text-mute);white-space:nowrap}
  .list-progress-bar{height:2px;background:var(--border);border-radius:1px;margin:2px 10px 6px 30px;overflow:hidden}
  .list-progress-fill{height:100%;border-radius:1px;transition:width .3s}
  .sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);flex-shrink:0}
  .sync-status{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);font-size:12px;color:var(--text-dim)}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text-mute)}
  .sync-dot.ok{background:var(--teal)}
  .sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
  .sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── MAIN PANEL ── */
  #mainPanel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .panel-header{padding:20px 24px 0;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .panel-title{font-size:22px;font-weight:700;flex:1}
  .panel-title-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
  .panel-actions{display:flex;gap:6px;flex-shrink:0}
  .quick-add{margin:12px 24px 0;flex-shrink:0}
  .quick-add-inner{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;transition:border-color .2s}
  .quick-add-inner:focus-within{border-color:var(--teal)}
  .quick-add-inner input{background:none;border:none;padding:0;font-size:15px;flex:1;color:var(--text)}
  .quick-add-inner input::placeholder{color:var(--text-mute)}
  .quick-add-submit{color:var(--teal);font-size:22px;line-height:1;flex-shrink:0;opacity:.5;transition:opacity .2s;border:none;background:none;cursor:pointer}
  .quick-add-inner:focus-within .quick-add-submit{opacity:1}
  .tasks-container{flex:1;overflow-y:auto;padding:16px 24px}

  /* ── TASK ITEMS ── */
  .task-group-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-mute);font-weight:600;padding:16px 0 8px;display:flex;align-items:center;justify-content:space-between}
  .task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:border-color .15s,background .15s,opacity .3s}
  .task-item:hover{border-color:var(--surface2);background:var(--surface2)}
  .task-item.done{opacity:.55}
  .task-item.overdue:not(.done){border-left:3px solid var(--red)}
  .task-item.due-today:not(.done){border-left:3px solid var(--amber)}
  .task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
  .task-check:hover{border-color:var(--teal)}
  .task-item.done .task-check{background:var(--teal);border-color:var(--teal)}
  .task-check-icon{display:none;color:#0F1B2D;font-size:11px;font-weight:700}
  .task-item.done .task-check-icon{display:block}
  .task-body{flex:1;min-width:0}
  .task-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .task-item.done .task-title{text-decoration:line-through;color:var(--text-dim)}
  .task-notes-preview{font-size:12px;color:var(--text-dim);margin-top:3px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.45}
  .task-meta{display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap}
  .task-badge{font-size:11px;padding:2px 7px;border-radius:10px;line-height:1.4}
  .badge-prio-high{background:rgba(239,68,68,.15);color:#FCA5A5}
  .badge-prio-mid{background:rgba(245,158,11,.15);color:#FCD34D}
  .badge-prio-low{background:rgba(99,179,237,.15);color:#93C5FD}
  .badge-date{background:var(--surface2);color:var(--text-dim)}
  .badge-date.overdue{background:rgba(239,68,68,.15);color:#FCA5A5}
  .badge-date.today{background:rgba(245,158,11,.15);color:#FCD34D}
  .badge-recur{background:rgba(0,201,167,.1);color:var(--teal)}
  .badge-sub{background:var(--surface2);color:var(--text-dim)}
  .task-pin{margin-left:auto;font-size:13px;color:var(--text-mute);flex-shrink:0;opacity:.35;transition:opacity .2s;cursor:pointer;padding:2px}
  .task-pin:hover{opacity:1}
  .task-pin.pinned{color:var(--amber);opacity:1}
  .task-list-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--teal);color:#0F1B2D;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,201,167,.4);transition:transform .2s,background .2s;z-index:100;border:none;cursor:pointer}
  .fab:hover{transform:scale(1.08);background:var(--teal-dim)}
  .fab:active{transform:scale(.95)}

  /* ── DETAIL DRAWER ── */
  #detailDrawer{width:340px;min-width:340px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s}
  #detailDrawer.open{transform:translateX(0)}
  .drawer-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .drawer-header h3{font-size:15px;font-weight:600}
  .drawer-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
  .drawer-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
  .field-group{display:flex;flex-direction:column;gap:6px}
  .field-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);font-weight:600}
  .prio-btns{display:flex;gap:6px}
  .prio-btn{flex:1;padding:7px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:500;color:var(--text-dim);transition:all .15s;cursor:pointer}
  .prio-btn.sel-high{border-color:var(--red);background:rgba(239,68,68,.15);color:#FCA5A5}
  .prio-btn.sel-mid{border-color:var(--amber);background:rgba(245,158,11,.15);color:#FCD34D}
  .prio-btn.sel-low{border-color:#3B82F6;background:rgba(59,130,246,.15);color:#93C5FD}
  .subtask-list{display:flex;flex-direction:column;gap:6px}
  .subtask-item{display:flex;gap:8px;align-items:center}
  .subtask-check{width:16px;height:16px;border-radius:3px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .subtask-check.done{background:var(--teal);border-color:var(--teal)}
  .subtask-check.done::after{content:'✓';color:#0F1B2D;font-size:10px;font-weight:700}
  .subtask-title{flex:1;font-size:13px}
  .subtask-title.done{text-decoration:line-through;color:var(--text-dim)}
  .subtask-del{color:var(--text-mute);font-size:14px;cursor:pointer;padding:2px 4px}
  .subtask-del:hover{color:var(--red)}
  .add-subtask-row{display:flex;gap:6px;margin-top:4px}
  .add-subtask-row input{font-size:13px}
  .mail-row{display:flex;gap:8px;flex-wrap:wrap}
  .mail-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--text-dim);transition:all .15s;white-space:nowrap;cursor:pointer}
  .mail-btn:hover{border-color:var(--teal);color:var(--teal)}

  /* ── MODALS ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:500px;display:flex;flex-direction:column;box-shadow:var(--shadow);max-height:90vh}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .modal-header h3{font-size:18px;font-weight:700}
  .modal-body{padding:24px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;flex-wrap:wrap}
  .color-picker{display:flex;gap:8px;flex-wrap:wrap}
  .color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
  .color-swatch:hover{transform:scale(1.15)}
  .color-swatch.sel{border-color:#fff;transform:scale(1.1)}

  /* ── SETTINGS ── */
  #settingsPanel{display:none;flex-direction:column;flex:1;overflow:hidden}
  .settings-scroll{flex:1;overflow-y:auto;padding:20px 24px 100px}
  .settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
  .settings-section:last-child{margin-bottom:0}
  .settings-section-title{padding:12px 18px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-mute);font-weight:600;background:rgba(0,0,0,.15);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .settings-row{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);gap:16px;min-height:60px}
  .settings-row:last-child{border-bottom:none}
  .settings-row-info{flex:1;min-width:0}
  .settings-row-label{font-size:14px;font-weight:500;color:var(--text)}
  .settings-row-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
  .settings-row-action{flex-shrink:0}
  .toggle{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
  .toggle.on{background:var(--teal)}
  .toggle::after{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
  .toggle.on::after{left:23px}

  /* ── GUIDE ── */
  .guide-step{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
  .guide-step:last-child{border-bottom:none;padding-bottom:0}
  .guide-step-num{width:26px;height:26px;border-radius:50%;background:var(--teal);color:#0F1B2D;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .guide-step-title{font-weight:600;font-size:14px;margin-bottom:3px}
  .guide-step-desc{font-size:13px;color:var(--text-dim);line-height:1.5}
  .guide-step-desc code{background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--teal);word-break:break-all}
  .guide-note{background:rgba(0,201,167,.08);border:1px solid rgba(0,201,167,.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--text-dim);margin-top:4px}

  /* ── EMPTY STATE ── */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-mute);padding:60px 40px;text-align:center}
  .empty-icon{font-size:48px}
  .empty-title{font-size:16px;font-weight:600;color:var(--text-dim)}
  .empty-sub{font-size:13px}

  /* ── TOAST ── */
  #toastContainer{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:900;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 18px;font-size:13px;color:var(--text);box-shadow:var(--shadow);animation:toastIn .3s ease;white-space:nowrap}
  .toast.success{border-color:var(--teal)}
  .toast.error{border-color:var(--red)}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ── SHARE ── */
  .share-link-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text-dim);word-break:break-all;line-height:1.6}

  /* ── READONLY ── */
  #readonlyView{display:none;flex-direction:column;min-height:100vh;padding:32px;max-width:600px;margin:0 auto}
  .readonly-task{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}

  /* ── SORT ARROWS ── */
  .sort-arrows{display:flex;flex-direction:column;gap:2px;flex-shrink:0;margin-right:2px}
  .sort-btn{background:none;border:none;color:var(--text-mute);font-size:13px;line-height:1;padding:1px 4px;cursor:pointer;border-radius:3px;transition:color .15s,background .15s}
  .sort-btn:hover{color:var(--teal);background:rgba(0,201,167,.1)}
  .sort-btn:disabled{opacity:.15;cursor:default}

  /* ── MOBILE ── */
  @media(max-width:1200px){
    #sidebar{position:fixed;inset:0 auto 0 0;z-index:200;transform:translateX(-100%);width:82vw;max-width:320px}
    #sidebar.open{transform:translateX(0);box-shadow:var(--shadow)}
    .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;display:none}
    .sidebar-overlay.show{display:block}
    #detailDrawer{position:fixed;inset:0;width:100%;z-index:300;transform:translateY(100%);transition:transform .3s;border-left:none;border-top:1px solid var(--border);min-width:unset}
    #detailDrawer.open{transform:translateY(0)}

</style>
</head>

        <span class="bottom-nav-icon">📁</span>Listen

<script>
// ── VERSION ──
const APP_VERSION = '1.1.20';

// ── KEYS ──
const STORAGE_KEY='tf_data', SALT_KEY='tf_salt', AUTH_KEY='tf_auth', METHOD_KEY='tf_method', PINLEN_KEY='tf_pinlen';

// ── DEFAULT STATE ──
function defaultState(){
  return {
    lists:[], tasks:[],
    settings:{
      method:'password',
      display:{notes:true,priority:true,dueDate:true,recur:true,subtasks:true,listDot:true}
    },
    meta:{lastSync:null,version:APP_VERSION}
  };
}
let state = defaultState();
let currentView='myday', currentListId=null, editingTaskId=null;
let lockAttempts=0, lockUntil=0, pinBuffer='', syncTimer=null;

// ── CRYPTO ──
async function deriveKey(pw,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptData(data,pw){
  let saltB64=localStorage.getItem(SALT_KEY),salt;
  if(!saltB64){salt=crypto.getRandomValues(new Uint8Array(16));localStorage.setItem(SALT_KEY,btoa(String.fromCharCode(...salt)));}
  else salt=Uint8Array.from(atob(saltB64),c=>c.charCodeAt(0));
  const key=await deriveKey(pw,salt);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(data)));
  const out=new Uint8Array(12+ct.byteLength);
  out.set(iv);out.set(new Uint8Array(ct),12);
  return btoa(String.fromCharCode(...out));
}
async function decryptData(b64,pw){
  const saltB64=localStorage.getItem(SALT_KEY);
  if(!saltB64)throw new Error('no salt');
  const salt=Uint8Array.from(atob(saltB64),c=>c.charCodeAt(0));
  const key=await deriveKey(pw,salt);
  const buf=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(0,12)},key,buf.slice(12));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function saveData(triggerSync=false){
  const pw=sessionStorage.getItem('tf_pw');if(!pw)return;
  localStorage.setItem(METHOD_KEY,state.settings.method||'password');
  localStorage.setItem(STORAGE_KEY,await encryptData(state,pw));
  if(triggerSync)debouncedSync();
}
async function loadData(pw){
  const enc=localStorage.getItem(STORAGE_KEY);
  if(!enc)return true;
  try{
    const loaded=await decryptData(enc,pw);
    state=loaded;
    // migrate missing fields
    if(!state.settings.display)state.settings.display={notes:true,priority:true,dueDate:true,recur:true,subtasks:true,listDot:true};
    ['notes','priority','dueDate','recur','subtasks','listDot'].forEach(k=>{if(state.settings.display[k]===undefined)state.settings.display[k]=true;});
    return true;
  }catch{return false;}
}
async function hashAuth(pw, prefix){
  const p = prefix || 'tf_v2_';
  const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p+pw));
  return btoa(String.fromCharCode(...new Uint8Array(h)));
}
async function setAuthHash(pw){localStorage.setItem(AUTH_KEY,await hashAuth(pw,'tf_v2_'));}
async function checkAuthHash(pw){
  const s=localStorage.getItem(AUTH_KEY);
  if(!s)return false;
  // Try new prefix first
  if(s===await hashAuth(pw,'tf_v2_'))return true;
  // Fallback: try old prefix from v1.x
  if(s===await hashAuth(pw,'tf_auth_')){
    // Migrate to new prefix silently
    await setAuthHash(pw);
    return true;
  }
  return false;
}

// ── SETUP ──
let setupMethod='password';
function selectSetupMethod(m){
  setupMethod=m;
  document.getElementById('setupMethodPw').classList.toggle('active',m==='password');
  document.getElementById('setupMethodPin').classList.toggle('active',m==='pin');
  document.getElementById('setupPwFields').style.display=m==='password'?'flex':'none';
  document.getElementById('setupPinFields').style.display=m==='pin'?'flex':'none';
}
async function submitSetup(){
  const err=document.getElementById('setupError');err.textContent='';
  if(setupMethod==='password'){
    const p1=document.getElementById('setupPw1').value,p2=document.getElementById('setupPw2').value;
    if(p1.length<4){err.textContent='Mindestens 4 Zeichen';return;}
    if(p1!==p2){err.textContent='Passwörter stimmen nicht überein';return;}
    state.settings.method='password';
    await setAuthHash(p1);sessionStorage.setItem('tf_pw',p1);
  }else{
    const p1=document.getElementById('setupPinInput').value,p2=document.getElementById('setupPinConfirm').value;
    if(!/^\d{4,8}$/.test(p1)){err.textContent='PIN: 4–8 Ziffern';return;}
    if(p1!==p2){err.textContent='PINs stimmen nicht überein';return;}
    state.settings.method='pin';
    localStorage.setItem(PINLEN_KEY,String(p1.length));
    await setAuthHash(p1);sessionStorage.setItem('tf_pw',p1);
  }
  state.lists=[{id:uid(),name:'Arbeit',color:'#00C9A7'},{id:uid(),name:'Privat',color:'#3B82F6'},{id:uid(),name:'Einkauf',color:'#F59E0B'}];
  await saveData(false);
  document.getElementById('setupScreen').style.display='none';
  launchApp();
}

// ── LOCK ──
function showLockScreen(){
  const method=localStorage.getItem(METHOD_KEY)||'password';
  document.getElementById('lockScreen').style.display='flex';
  if(method==='pin'){
    document.getElementById('lockSubtitle').textContent='PIN eingeben';
    document.getElementById('lockPwForm').style.display='none';
    document.getElementById('lockPinForm').style.display='flex';
    buildPinPad(parseInt(localStorage.getItem(PINLEN_KEY)||'4'));
  }else{
    document.getElementById('lockSubtitle').textContent='Passwort eingeben';
    document.getElementById('lockPwForm').style.display='flex';
    document.getElementById('lockPinForm').style.display='none';
    setTimeout(()=>document.getElementById('lockPwInput').focus(),80);
  }
}
async function submitLockPw(){
  if(Date.now()<lockUntil){document.getElementById('lockError').textContent='Gesperrt. Bitte warten...';return;}
  const pw=document.getElementById('lockPwInput').value;
  if(!await checkAuthHash(pw)){
    lockAttempts++;
    if(lockAttempts>=5){lockUntil=Date.now()+30000;lockAttempts=0;document.getElementById('lockError').textContent='Zu viele Versuche — 30s Sperre.';return;}
    document.getElementById('lockError').textContent=`Falsches Passwort (${lockAttempts}/5)`;return;
  }
  sessionStorage.setItem('tf_pw',pw);
  if(!await loadData(pw)){document.getElementById('lockError').textContent='Entschlüsselung fehlgeschlagen.';return;}
  document.getElementById('lockScreen').style.display='none';launchApp();
}
document.getElementById('lockPwInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitLockPw();});

function buildPinPad(pinLen){
  pinBuffer='';
  const dots=document.getElementById('pinDots'),pad=document.getElementById('pinPad');
  dots.innerHTML='';pad.innerHTML='';
  for(let i=0;i<pinLen;i++){const d=document.createElement('div');d.className='pin-dot';d.id='pd'+i;dots.appendChild(d);}
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{
    const b=document.createElement('button');b.className='pin-btn'+(k===''?' action':'');b.textContent=k;
    if(k!=='')b.onclick=()=>pinPress(k,pinLen);pad.appendChild(b);
  });
}
async function pinPress(k,pinLen){
  if(Date.now()<lockUntil){document.getElementById('pinError').textContent='Gesperrt.';return;}
  if(k==='⌫')pinBuffer=pinBuffer.slice(0,-1);else if(pinBuffer.length<pinLen)pinBuffer+=k;
  for(let i=0;i<pinLen;i++){const d=document.getElementById('pd'+i);if(d)d.classList.toggle('filled',i<pinBuffer.length);}
  if(pinBuffer.length===pinLen){
    if(!await checkAuthHash(pinBuffer)){
      lockAttempts++;
      if(lockAttempts>=5){lockUntil=Date.now()+30000;lockAttempts=0;document.getElementById('pinError').textContent='Zu viele Versuche — 30s Sperre.';}
      else document.getElementById('pinError').textContent=`Falsche PIN (${lockAttempts}/5)`;
      pinBuffer='';for(let i=0;i<pinLen;i++){const d=document.getElementById('pd'+i);if(d)d.classList.remove('filled');}
      return;
    }
    sessionStorage.setItem('tf_pw',pinBuffer);
    if(!await loadData(pinBuffer)){document.getElementById('pinError').textContent='Fehler.';pinBuffer='';return;}
    document.getElementById('lockScreen').style.display='none';launchApp();
  }
}

// ── LAUNCH ──
function launchApp(){
  document.getElementById('app').style.display='flex';
  renderSidebar();selectView('myday');updateCounts();initSyncStatus();
  // Auto-reconnect GD if client ID saved but token expired
  setTimeout(()=>silentReconnectGD(),1000);
  // Load from Drive on startup and refresh UI if remote is newer
  setTimeout(async()=>{
    const refreshed=await loadFromDrive();
    if(refreshed){renderSidebar();renderTasks();updateCounts();}
  },1500);
  if(window.innerWidth<=1200){
    document.getElementById('menuBtn').style.display='flex';
    document.getElementById('settingsMenuBtn').style.display='flex';
  }
}

// ── UTILS ──
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){
  if(!d)return'';const dt=new Date(d+'T00:00:00'),t=today();
  if(d===t)return'Heute';if(d<t)return`⚠ ${dt.toLocaleDateString('de-CH',{day:'numeric',month:'short'})}`;
  return dt.toLocaleDateString('de-CH',{day:'numeric',month:'short'});
}
function isOverdue(d){return d&&d<today();}
function isToday(d){return d===today();}
function getList(id){return state.lists.find(l=>l.id===id);}
function getTask(id){return state.tasks.find(t=>t.id===id);}
function disp(){return state.settings.display;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── SIDEBAR ──
function renderSidebar(){
  const c=document.getElementById('listsContainer');c.innerHTML='';
  state.lists.forEach(list=>{
    const all=state.tasks.filter(t=>t.listId===list.id);
    const done=all.filter(t=>t.done).length,total=all.length,open=total-done;
    const pct=total?Math.round(done/total*100):0;
    const div=document.createElement('div');
    div.innerHTML=`
      <div class="list-item${currentView==='list'&&currentListId===list.id?' active':''}" onclick="selectList('${list.id}')">
        <div class="list-color-dot" style="background:${list.color}"></div>
        <div class="list-name">${esc(list.name)}</div>
        <div class="list-progress-text">${open} offen</div>
        <button class="icon-btn" onclick="event.stopPropagation();openListMenu('${list.id}')" style="font-size:15px;margin-left:2px">⋯</button>
      </div>
      <div class="list-progress-bar"><div class="list-progress-fill" style="width:${pct}%;background:${list.color}"></div></div>`;
    c.appendChild(div);
  });
}
function updateCounts(){
  document.getElementById('countMyDay').textContent=state.tasks.filter(t=>!t.done&&(isToday(t.dueDate)||t.pinMyDay)).length;
  document.getElementById('countAll').textContent=state.tasks.filter(t=>!t.done).length;
  document.getElementById('countOverdue').textContent=state.tasks.filter(t=>!t.done&&isOverdue(t.dueDate)).length;
}

// ── VIEWS ──
function selectView(view){
  currentView=view;currentListId=null;
  document.getElementById('tasksView').style.display='flex';
  document.getElementById('settingsPanel').style.display='none';
  document.getElementById('shareBtn').style.display='none';
  document.getElementById('fabBtn').style.display='flex';
  const titles={myday:'☀️ Mein Tag',all:'📋 Alle Aufgaben',overdue:'⚠️ Überfällig'};
  document.getElementById('panelTitle').textContent=titles[view]||view;
  document.getElementById('panelDot').style.display='none';
  ['navMyDay','navAll','navOverdue'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(view==='myday')document.getElementById('navMyDay').classList.add('active');
  if(view==='all')document.getElementById('navAll').classList.add('active');
  if(view==='overdue')document.getElementById('navOverdue').classList.add('active');
  renderSidebar();renderTasks();updateCounts();
  if(window.innerWidth<=1200)closeSidebar();
}
function selectList(listId){
  currentView='list';currentListId=listId;
  const list=getList(listId);
  document.getElementById('tasksView').style.display='flex';
  document.getElementById('settingsPanel').style.display='none';
  document.getElementById('panelTitle').textContent=list.name;
  document.getElementById('panelDot').style.display='block';
  document.getElementById('panelDot').style.background=list.color;
  document.getElementById('shareBtn').style.display='flex';
  document.getElementById('fabBtn').style.display='flex';
  renderSidebar();renderTasks();updateCounts();
  if(window.innerWidth<=1200)closeSidebar();
}

// ── TASK RENDERING ──
function getViewTasks(){
  let t=[...state.tasks];
  if(currentView==='myday')  t=t.filter(x=>!x.done&&(isToday(x.dueDate)||x.pinMyDay));
  if(currentView==='all')    t=t.filter(x=>!x.done);
  if(currentView==='overdue')t=t.filter(x=>!x.done&&isOverdue(x.dueDate));
  if(currentView==='list')   t=t.filter(x=>x.listId===currentListId);
  return t;
}
function renderTasks(){
  const c=document.getElementById('tasksContainer');c.innerHTML='';
  const tasks=getViewTasks();
  const prioOrd={high:0,mid:1,low:2,'':3};
  // In list view sort by sortOrder (manual); in smart views sort by prio+date
  const sort=(arr)=>currentView==='list'
    ?arr.slice().sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0))
    :arr.slice().sort((a,b)=>(prioOrd[a.priority||'']||3)-(prioOrd[b.priority||'']||3)||(a.dueDate||'z').localeCompare(b.dueDate||'z'));
  // Initialize sortOrder for list view tasks that don't have it
  if(currentView==='list'){
    const unsorted=tasks.filter(t=>!t.done&&!t.sortOrder);
    if(unsorted.length){
      const maxO=Math.max(0,...tasks.filter(t=>t.sortOrder).map(t=>t.sortOrder));
      unsorted.forEach((t,i)=>t.sortOrder=maxO+(i+1)*1000);
    }
  }
  const open=sort(tasks.filter(t=>!t.done));
  const done=sort(tasks.filter(t=>t.done));

  if(open.length===0&&done.length===0){
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-title">Alles erledigt!</div><div class="empty-sub">Neue Aufgabe über das + hinzufügen</div></div>`;
    return;
  }
  open.forEach(t=>c.appendChild(buildTaskEl(t)));

  // Done tasks always visible at bottom
  if(done.length>0){
    const hdr=document.createElement('div');hdr.className='task-group-label';
    hdr.innerHTML=`<span>Erledigt (${done.length})</span><button class="icon-btn" onclick="deleteAllDone()" style="font-size:12px;color:var(--text-mute);height:24px;width:auto;padding:0 6px">Alle löschen</button>`;
    c.appendChild(hdr);

    :'';
  el.innerHTML=`
    ${arrowsHTML}
    <div class="task-check" onclick="event.stopPropagation();toggleTaskDone('${task.id}')"><span class="task-check-icon">✓</span></div>
    ${d.listDot&&list?`<div class="task-list-dot" style="background:${list.color}"></div>`:''}

  el.addEventListener('click', e=>{ if(e.target.closest('.sort-arrows'))return; openDrawer(task.id); });
  return el;
}

// ── DRAG & DROP ──
async function moveTask(btn){
  const taskId=btn.dataset.taskid;
  const dir=parseInt(btn.dataset.dir);
  // Only works in list view
  if(currentView !== 'list') return;

  // Get open tasks in this list, sorted by current sortOrder
  const listTasks = state.tasks
    .filter(t => t.listId === currentListId && !t.done);

  // Initialize sortOrder for any task that doesn't have it
  // Sort by existing sortOrder first, then assign clean values
  listTasks.sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
  listTasks.forEach((t,i) => { t.sortOrder = (i+1) * 1000; });

  // Now find the task and its neighbour
  const idx = listTasks.findIndex(t => t.id === taskId);
  const swapIdx = idx + dir;
  if(idx === -1 || swapIdx < 0 || swapIdx >= listTasks.length) return;

  // Swap their sortOrder values directly on state objects
  const a = listTasks[idx];
  const b = listTasks[swapIdx];
  const tmp = a.sortOrder;
  a.sortOrder = b.sortOrder;
  b.sortOrder = tmp;

  await saveData(true);
  renderTasks();

  // Restore focus
  setTimeout(() => {
    const focusBtn = document.getElementById((dir===-1?'up_':'dn_')+taskId);
    if(focusBtn) focusBtn.focus();
  }, 50);
}

async function toggleTaskDone(id){
  const task=getTask(id);if(!task)return;
  task.done=!task.done;task.doneAt=task.done?new Date().toISOString():null;
  if(task.done&&task.recur&&task.recur!=='none')scheduleRecurring(task);
  await saveData(true);renderTasks();updateCounts();renderSidebar();
  if(editingTaskId===id)renderDrawer(id);
}
async function togglePin(id){
  const t=getTask(id);if(!t)return;t.pinMyDay=!t.pinMyDay;
  await saveData(true);renderTasks();updateCounts();
}
function scheduleRecurring(task){
  if(!task.dueDate)return;
  const n=new Date(task.dueDate+'T00:00:00');
  if(task.recur==='daily')n.setDate(n.getDate()+1);
  if(task.recur==='weekly')n.setDate(n.getDate()+7);
  if(task.recur==='monthly')n.setMonth(n.getMonth()+1);
  state.tasks.push({...task,id:uid(),done:false,doneAt:null,dueDate:n.toISOString().slice(0,10),subtasks:(task.subtasks||[]).map(s=>({...s,done:false}))});
}
async function deleteTask(id){
  state.tasks=state.tasks.filter(t=>t.id!==id);closeDrawer();
  await saveData(true);renderTasks();updateCounts();renderSidebar();toast('Aufgabe gelöscht');
}
async function deleteAllDone(){
  const ids=getViewTasks().filter(t=>t.done).map(t=>t.id);
  state.tasks=state.tasks.filter(t=>!ids.includes(t.id));
  await saveData(true);renderTasks();updateCounts();renderSidebar();

}

  if(!await checkAuthHash(cur)){toast('Falsche Eingabe','error');return;}
  const nm=state.settings.method==='pin'?'password':'pin';
  const nw=prompt(nm==='pin'?'Neue PIN (4–8 Ziffern):':'Neues Passwort (min. 4 Zeichen):');if(!nw)return;
  if(nm==='pin'&&!/^\d{4,8}$/.test(nw)){toast('PIN: 4–8 Ziffern','error');return;}
  if(nm==='password'&&nw.length<4){toast('Zu kurz','error');return;}
  state.settings.method=nm;
  if(nm==='pin')localStorage.setItem(PINLEN_KEY,String(nw.length));
  await setAuthHash(nw);sessionStorage.setItem('tf_pw',nw);
  localStorage.removeItem(SALT_KEY);await saveData(false);
  toast(`Methode auf ${nm==='pin'?'PIN':'Passwort'} geändert ✓`,'success');renderSettings();
}

// ── EXPORT / IMPORT ──
function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download=`taskflow-backup-${today()}.json`;a.click();toast('Export erfolgreich ✓','success');
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=JSON.parse(await file.text());
      if(!data.lists||!data.tasks)throw new Error('invalid');
      if(!data.settings.display)data.settings.display={notes:true,priority:true,dueDate:true,recur:true,subtasks:true,listDot:true};
      state=data;await saveData(true);renderSidebar();renderTasks();updateCounts();renderSettings();
      toast('Import erfolgreich ✓','success');
    }catch{toast('Fehler beim Importieren','error');}};
  inp.click();
}
async function resetAll(){if(!confirm('Alle Daten unwiderruflich löschen?'))return;localStorage.clear();sessionStorage.clear();location.reload();}

    <div class="guide-step"><div class="guide-step-num">1</div><div>
      <div class="guide-step-title">Google Cloud Console öffnen</div>
      <div class="guide-step-desc">Gehe zu <a href="https://console.cloud.google.com" target="_blank">console.cloud.google.com</a> und melde dich an.</div>
    </div></div>
    <div class="guide-step"><div class="guide-step-num">2</div><div>
      <div class="guide-step-title">Neues Projekt erstellen</div>
      <div class="guide-step-desc">Projekt-Dropdown oben links → <strong>Neues Projekt</strong> → Name: <code>TaskFlow</code> → Erstellen.</div>
    </div></div>

      <div class="guide-step-title">Google Drive API aktivieren</div>
      <div class="guide-step-desc"><strong>APIs &amp; Dienste → Bibliothek</strong> → suche <code>Google Drive API</code> → Aktivieren.</div>
    </div></div>
    <div class="guide-step"><div class="guide-step-num">4</div><div>
      <div class="guide-step-title">OAuth Consent Screen</div>
      <div class="guide-step-desc"><strong>Google Auth Platform → Branding</strong> → App-Name: <code>TaskFlow</code> → deine E-Mail → Speichern.<br>
      Dann <strong>Audience → External → Add users</strong> → deine Gmail-Adresse eintragen.</div>
    </div></div>

      <div class="guide-step-title">OAuth-Client-ID erstellen</div>
      <div class="guide-step-desc"><strong>Clients → + Create Client</strong> → Typ: <strong>Web application</strong><br>
      Authorized JavaScript origins: <code>${location.origin}</code><br>

      → Create.</div>
    </div></div>
    <div class="guide-step"><div class="guide-step-num">6</div><div>
      <div class="guide-step-title">Client-ID kopieren &amp; einfügen</div>

    </div></div>
    <div class="guide-note">💡 Kein Passwort oder Client-Secret nötig. Der Token wird nur für diese Browser-Session gespeichert.</div>`,
    confirm:'Verbinden →',onConfirm:async()=>{connectGD();return true;}});

function gdAuthUrl(clientId, prompt){
  return 'https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({
    client_id:clientId,
    redirect_uri:location.origin+location.pathname,
    response_type:'token',
    scope:'https://www.googleapis.com/auth/drive.appdata',
    state:'gd_auth_implicit',
    prompt:prompt||'',
    include_granted_scopes:'true'
  });
}

function connectGD(){
  const clientId=prompt('Google OAuth Client-ID einfügen\n(endet auf .apps.googleusercontent.com):');
  if(!clientId?.includes('.apps.googleusercontent.com')){toast('Ungültige Client-ID','error');return;}
  localStorage.setItem('tf_gd_clientid',clientId);
  location.href=gdAuthUrl(clientId,'select_account');
}

function reconnectGD(){
  // Called when token expired — reuse saved client ID, open popup
  const clientId=localStorage.getItem('tf_gd_clientid');
  if(!clientId){toast('Bitte erst verbinden','error');return;}
  const url=gdAuthUrl(clientId,'');
  const popup=window.open(url,'gdauth','width=500,height=600,left=200,top=100');
  if(!popup){
    // Popup blocked — fallback to redirect
    location.href=url;
    return;
  }
  // Poll until popup closes or token appears in localStorage
  const poll=setInterval(()=>{
    try{
      const h=new URLSearchParams(popup.location.hash.replace('#',''));
      const t=h.get('access_token');
      if(t){
        storeGDToken(t, parseInt(h.get('expires_in')||'3600'));
        popup.close();
        clearInterval(poll);
        toast('Google Drive verbunden ✓','success');
        setSyncStatus('ok','Verbunden');
        renderSettings();
        // Sync once after reconnect
        setTimeout(syncNow,1000);
      }
    }catch(e){/* cross-origin while loading — ignore */}
    if(popup.closed){
      clearInterval(poll);
      // Check if token was stored via handleGDCallback
      if(getGDToken()){
        toast('Google Drive verbunden ✓','success');
        setSyncStatus('ok','Verbunden');
        renderSettings();
        setTimeout(syncNow,1000);
      }
    }
  },500);
}

function storeGDToken(token, expiresIn){
  const expiresAt=Date.now()+(expiresIn*1000)-120000; // 2 min buffer
  localStorage.setItem('tf_gd_token',token);
  localStorage.setItem('tf_gd_expires',String(expiresAt));
}

function disconnectGD(){
  localStorage.removeItem('tf_gd_token');
  localStorage.removeItem('tf_gd_expires');
  localStorage.removeItem('tf_gd_clientid');
  toast('Google Drive getrennt');renderSettings();initSyncStatus();
}

function handleGDCallback(){
  const hash=new URLSearchParams(location.hash.replace('#',''));
  if(hash.get('access_token')&&hash.get('state')==='gd_auth_implicit'){
    storeGDToken(hash.get('access_token'), parseInt(hash.get('expires_in')||'3600'));
    history.replaceState({},'',location.pathname);
    toast('Google Drive verbunden ✓','success');
    return true;
  }
  return false;
}

function getGDToken(){
  const token=localStorage.getItem('tf_gd_token');
  const expires=parseInt(localStorage.getItem('tf_gd_expires')||'0');
  if(!token||Date.now()>expires)return null;
  return token;
}

function silentReconnectGD(){
  const clientId=localStorage.getItem('tf_gd_clientid');
  if(!clientId||getGDToken())return;
  // Try silent iframe first
  setSyncStatus('syncing','Verbinde...');
  const iframe=document.createElement('iframe');
  iframe.style.display='none';
  iframe.src=gdAuthUrl(clientId,'none');
  let done=false;
  iframe.onload=()=>{
    if(done)return;
    try{
      const h=new URLSearchParams(iframe.contentWindow.location.hash.replace('#',''));
      const t=h.get('access_token');
      if(t){
        done=true;
        storeGDToken(t, parseInt(h.get('expires_in')||'3600'));
        setSyncStatus('ok','Verbunden');
        // Only load from drive on silent reconnect, don't upload
        loadFromDrive().then(refreshed=>{if(refreshed){renderSidebar();renderTasks();updateCounts();}});
      } else {
        // Silent failed — show reconnect button
        setSyncStatus('error','Token abgelaufen');
        showReconnectHint();
      }
    }catch(e){
      // Cross-origin = needs user interaction
      if(!done){done=true;setSyncStatus('error','Token abgelaufen');showReconnectHint();}
    }
    if(document.body.contains(iframe))document.body.removeChild(iframe);
  };
  setTimeout(()=>{
    if(!done){done=true;setSyncStatus('error','Token abgelaufen');showReconnectHint();if(document.body.contains(iframe))document.body.removeChild(iframe);}
  },5000);
  document.body.appendChild(iframe);
}

function showReconnectHint(){
  // Show reconnect button in sync status bar
  document.getElementById('syncLabel').innerHTML='Token abgelaufen';
  const btn=document.getElementById('reconnectBtn');
  if(!btn){
    const b=document.createElement('button');
    b.id='reconnectBtn';b.className='icon-btn';
    b.title='Neu verbinden';b.textContent='🔑';
    b.style.cssText='margin-left:4px;color:var(--amber)';
    b.onclick=reconnectGD;
    document.querySelector('.sync-status').appendChild(b);
  }
}
async function gdFindFile(token){
  const fn='taskflow-data.json';
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${fn}'&fields=files(id,modifiedTime)`,{headers:{Authorization:'Bearer '+token}});
  const d=await r.json();
  return d.files?.[0]||null;
}
async function gdUpload(token,fileId,body){
  if(fileId){
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body});
  }else{
    const m=await(await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({name:'taskflow-data.json',parents:['appDataFolder']})})).json();
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${m.id}?uploadType=media`,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body});
    return m.id;
  }
  return fileId;
}
async function gdDownload(token,fileId){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+token}});
  return await r.json();
}

async function loadFromDrive(){
  const token=getGDToken();
  if(!token)return false;
  try{
    setSyncStatus('syncing','Lade von Drive...');
    const file=await gdFindFile(token);
    if(!file)return false; // nothing on drive yet
    const remote=await gdDownload(token,file.id);
    if(!remote||!remote.tasks)return false;
    // Merge: use whichever was synced more recently
    const localSync=state.meta?.lastSync?new Date(state.meta.lastSync).getTime():0;
    const remoteSync=remote.meta?.lastSync?new Date(remote.meta.lastSync).getTime():0;
    if(remoteSync>localSync){
      // Remote is newer — load it
      state=remote;
      if(!state.settings.display)state.settings.display={notes:true,priority:true,dueDate:true,recur:true,subtasks:true,listDot:true};
      ['notes','priority','dueDate','recur','subtasks','listDot'].forEach(k=>{if(state.settings.display[k]===undefined)state.settings.display[k]=true;});
      await saveData(false);
      setSyncStatus('ok','Synchronisiert');
      return true;
    }else{
      // Local is newer — upload it
      await gdUpload(token,file.id,JSON.stringify(state));
      state.meta.lastSync=new Date().toISOString();
      await saveData(false);
      setSyncStatus('ok','Synchronisiert');
      return false; // no UI refresh needed
    }
  }catch(e){
    console.error('loadFromDrive error',e);
    setSyncStatus('error','Drive-Fehler');
    return false;
  }
}

async function syncNow(){
  const token=getGDToken();
  if(!token){const cid=localStorage.getItem('tf_gd_clientid');if(cid){showReconnectHint();setSyncStatus('error','Token abgelaufen');}else{toast('Google Drive nicht verbunden','error');}return;}
  setSyncStatus('syncing','Synchronisiert...');
  try{
    const file=await gdFindFile(token);
    if(file){
      // Check if remote is newer first
      const remote=await gdDownload(token,file.id);
      const localSync=state.meta?.lastSync?new Date(state.meta.lastSync).getTime():0;
      const remoteSync=remote.meta?.lastSync?new Date(remote.meta.lastSync).getTime():0;
      if(remoteSync>localSync){
        state=remote;
        if(!state.settings.display)state.settings.display={notes:true,priority:true,dueDate:true,recur:true,subtasks:true,listDot:true};
        await saveData(false);
        renderSidebar();renderTasks();updateCounts();
        toast('Daten von Drive geladen ✓','success');
      } else {
        state.meta.lastSync=new Date().toISOString();
        await gdUpload(token,file.id,JSON.stringify(state));
        await saveData(false); // don't re-trigger sync
        toast('Sync ✓','success');
      }
    } else {
      // First time — upload
      state.meta.lastSync=new Date().toISOString();
      await gdUpload(token,null,JSON.stringify(state));
      await saveData(false);
      toast('Sync ✓','success');
    }
    setSyncStatus('ok','Synchronisiert');
    if(document.getElementById('settingsPanel').style.display!=='none')renderSettings();
  }catch(e){setSyncStatus('error','Sync-Fehler');toast('Sync fehlgeschlagen','error');}
}
function debouncedSync(){
  // Option C: trigger sync 4 seconds after last change
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    if(getGDToken()){
      await syncNow();
    }
  },4000);
}
function initSyncStatus(){const t=getGDToken();const cid=localStorage.getItem('tf_gd_clientid');if(t){setSyncStatus('ok','Verbunden');}else if(cid){setSyncStatus('syncing','Wird verbunden...');silentReconnectGD();}else{setSyncStatus('error','Nicht verbunden');}}
function setSyncStatus(s,lbl){
  document.getElementById('syncDot').className='sync-dot '+s;
  document.getElementById('syncLabel').textContent=lbl;
  // Remove reconnect button if status is ok
  if(s==='ok'){const b=document.getElementById('reconnectBtn');if(b)b.remove();}
}

// ── MODAL ──
function showModal({title,body,confirm,danger,onConfirm,onDanger}){
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.innerHTML=`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><h3>${title}</h3><button class="icon-btn" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <div class="modal-body">${body}</div>
      <div class="modal-footer">
        ${danger?`<button class="btn-danger" id="mdanger">${danger}</button>`:''}
        <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button>
        <button class="btn-primary" id="mconfirm">${confirm}</button>
      </div>
    </div>`;
  document.getElementById('modalContainer').appendChild(ov);
  ov.querySelector('#mconfirm').onclick=async()=>{if(await onConfirm()!==false)ov.remove();};
  if(danger)ov.querySelector('#mdanger').onclick=async()=>{if(await onDanger()!==false)ov.remove();};
  ov.addEventListener('click',()=>ov.remove());
}

// ── TOAST ──
function toast(msg,type=''){
  const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
  document.getElementById('toastContainer').appendChild(t);setTimeout(()=>t.remove(),2800);
}

// ── READONLY ──
function checkShareParam(){
  const s=new URLSearchParams(location.search).get('share');if(!s)return false;
  try{const data=JSON.parse(decodeURIComponent(escape(atob(s))));renderReadonly(data);return true;}catch{return false;}
}
function renderReadonly(data){
  document.getElementById('lockScreen').style.display='none';
  const rv=document.getElementById('readonlyView');rv.style.display='flex';
  const{list,tasks}=data;
  rv.innerHTML=`
    <div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <div style="width:14px;height:14px;border-radius:50%;background:${list.color}"></div>
        <h1 style="font-size:24px;font-weight:700">${esc(list.name)}</h1>
      </div>
      <div style="color:var(--text-dim);font-size:13px">${tasks.length} offene Aufgabe${tasks.length!==1?'n':''} · Schreibgeschützte Ansicht</div>
    </div>
    ${(tasks||[]).map(t=>`
      <div class="readonly-task">
        <div style="width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px"></div>
        <div>
          <div style="font-weight:500">${esc(t.title)}</div>
          ${t.dueDate?`<div style="font-size:12px;color:var(--text-dim);margin-top:3px">📅 ${new Date(t.dueDate+'T00:00:00').toLocaleDateString('de-CH')}</div>`:''}
          ${t.notes?`<div style="font-size:12px;color:var(--text-dim);margin-top:3px">${esc(t.notes.slice(0,120))}${t.notes.length>120?'…':''}</div>`:''}
        </div>
      </div>`).join('')}
    <div style="margin-top:32px;text-align:center;color:var(--text-mute);font-size:12px">Erstellt mit <a href="${location.origin+location.pathname}">TaskFlow</a></div>`;
}

// ── EMERGENCY RESET ──
function emergencyReset(){
  if(!confirm('ACHTUNG: Alle Daten werden gelöscht und du kannst dich neu einrichten. Fortfahren?'))return;
  if(!confirm('Wirklich alle Daten löschen? Diese Aktion kann nicht rückgängig gemacht werden.'))return;
  localStorage.clear();sessionStorage.clear();location.reload();
}

// ── INIT ──
async function init(){
  if(checkShareParam())return;
  const gdHandled=handleGDCallback();
  if(!localStorage.getItem(AUTH_KEY)){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('setupScreen').style.display='flex';
    return;
  }
  const spw=sessionStorage.getItem('tf_pw');
  if(spw&&await loadData(spw)){
    document.getElementById('lockScreen').style.display='none';
    launchApp();
    if(gdHandled)renderSettings();
    return;
  }
  showLockScreen();
}
window.addEventListener('resize',()=>{
  const m=window.innerWidth<=1200;
  document.getElementById('menuBtn').style.display=m?'flex':'none';
  document.getElementById('settingsMenuBtn').style.display=m?'flex':'none';
});
init();
</script>
